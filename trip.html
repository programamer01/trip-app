<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>旅行プラン提案アプリ</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      padding: 20px;
    }
    .container {
      max-width: 600px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h1 {
      text-align: center;
    }
    label {
      display: block;
      margin-top: 10px;
    }
    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }
    button {
      background: #4CAF50;
      color: white;
      cursor: pointer;
    }
    button:hover {
      background: #45a049;
    }
    .result {
      margin-top: 20px;
      background: #eef;
      padding: 15px;
      border-radius: 5px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>旅行プラン提案</h1>

    <label>出身地</label>
    <input type="text" id="origin" placeholder="例：東京">

    <label>日数</label>
    <input type="number" id="days" placeholder="例：2">

    <button onclick="generatePlan()">プランを作成</button>

    <div class="result" id="result"></div>
  </div>

  <script>
    async function generatePlan() {
  const origin = document.getElementById('origin').value;
  const days = document.getElementById('days').value;
  const result = document.getElementById('result');

  if (!origin || !days) {
    result.innerText = "入力をすべて埋めてください。";
    return;
  }

  result.innerText = "AIがプランを考え中...";

  try {
    const response = await fetch("https://api.openai.com/v1/responses", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer あなたのAPIキー"
      },
      body: JSON.stringify({
        model: "gpt-4.1-mini",
        input: `出身地は${origin}、旅行日数は${days}日です。おすすめの旅行プランを日本語でわかりやすく提案してください。`
      })
    });

    const data = await response.json();

    // AIの返答を取り出す
    const text = data.output[0].content[0].text;

    result.innerText = text;

  } catch (error) {
    result.innerText = "エラーが発生しました";
    console.error(error);
  }
}
  </script>
</body>
</html>
